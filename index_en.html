<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropertyTracker - 储物箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .logo {
            font-size: 5rem;
            margin-bottom: 15px;
        }
        h1 {
            color: white;
            font-size: 2.2rem;
            margin-bottom: 8px;
        }
        .subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        .lang-btn {
            display: inline-block;
            padding: 10px 28px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            color: white;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.2s;
            margin-bottom: 40px;
        }
        .lang-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 280px;
            margin: 0 auto;
        }
        .card {
            background: white;
            padding: 18px 24px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }
        .card .icon {
            font-size: 1.4rem;
        }
        .card .text {
            text-align: left;
        }
        .card .title {
            font-weight: 600;
            font-size: 1.05rem;
        }
        .footer {
            margin-top: 50px;
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .logo { font-size: 4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📦</div>
        <h1>PropertyTracker</h1>
        <p class="subtitle">储物箱 - Smart Item Management</p>

        <a href="index.html" class="lang-btn">中文</a>

        <div class="cards">
            <a href="privacy.html" class="card">
                <span class="icon">🔒</span>
                <span class="text">
                    <span class="title">Privacy Policy</span>
                </span>
            </a>
            <a href="user-agreement.html" class="card">
                <span class="icon">📄</span>
                <span class="text">
                    <span class="title">User Agreement</span>
                </span>
            </a>
            <a href="help.html" class="card">
                <span class="icon">📖</span>
                <span class="text">
                    <span class="title">User Guide</span>
                </span>
            </a>
        </div>

        <div class="footer">
            <p>&copy; 2026 PropertyTracker. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
